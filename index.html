<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi-Tech Calculator</title>
    <!-- Decimal.js untuk presisi tinggi -->
    <script src="https://cdn.jsdelivr.net/npm/decimal.js@10.4.3/decimal.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            background: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 20px;
        }
        
        .card {
            background: white;
            max-width: 1200px;
            width: 100%;
            border-radius: 36px;
            box-shadow: 0 20px 40px -12px rgba(0, 30, 60, 0.3);
            padding: 32px 32px 40px;
        }
        
        h1 {
            font-size: 2rem;
            font-weight: 500;
            color: #112f4b;
            margin: 0 0 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h1 small {
            font-size: 0.9rem;
            background: #1e3f60;
            color: white;
            padding: 4px 16px;
            border-radius: 40px;
            font-weight: 400;
        }
        
        /* BULK INPUT SECTION */
        .bulk-section {
            background: #f0f7ff;
            border-radius: 28px;
            padding: 24px;
            margin: 20px 0 28px 0;
            border: 2px dashed #38658f;
        }
        .bulk-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .bulk-title h3 {
            margin: 0;
            color: #1e3b5c;
            font-size: 1.2rem;
        }
        .bulk-badge {
            background: #1e3b5c;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
        }
        
        #bulkInput {
            width: 100%;
            min-height: 150px;
            padding: 16px;
            border: 2px solid #b9cbdf;
            border-radius: 20px;
            font-size: 1rem;
            font-family: 'JetBrains Mono', monospace;
            background: white;
            resize: vertical;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        
        .bulk-options {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .operator-selector {
            display: flex;
            gap: 8px;
            background: white;
            padding: 6px;
            border-radius: 40px;
            border: 1px solid #b9cbdf;
        }
        .op-option {
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.1s;
        }
        .op-option.selected {
            background: #1e3b5c;
            color: white;
        }
        
        .fill-btn {
            background: #1e3b5c;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 10px 32px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
        }
        .clear-btn {
            background: white;
            border: 1px solid #8ba5c2;
            border-radius: 40px;
            padding: 10px 28px;
            font-weight: 500;
            color: #153e60;
            cursor: pointer;
        }
        .preview-count {
            margin-left: auto;
            color: #38658f;
            font-size: 0.9rem;
            background: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-weight: 600;
        }
        
        /* TOTAL SECTION */
        .total-section {
            background: #e5effa;
            padding: 24px 28px;
            border-radius: 32px;
            margin: 20px 0 28px 0;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            border: 1px solid #bed4ec;
        }
        .total-label {
            font-size: 1.25rem;
            font-weight: 500;
            color: #0a2b46;
        }
        .total-value {
            font-size: 2.7rem;
            font-weight: 700;
            color: #003465;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 1px;
        }
        
        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 5px 18px rgba(0, 0, 0, 0.03);
        }
        th {
            background: #1e3b5c;
            color: white;
            font-weight: 500;
            font-size: 0.85rem;
            padding: 18px 8px;
            text-align: center;
        }
        th:first-child { padding-left: 24px; }
        td {
            padding: 8px 6px;
            border-bottom: 1px solid #dae3ee;
            vertical-align: middle;
        }
        
        .calc-input {
            width: 110px;
            padding: 8px 10px;
            border: 1px solid #b9cbdf;
            border-radius: 14px;
            font-family: 'JetBrains Mono', monospace;
            text-align: right;
        }
        .operator-btn {
            background: #e5effa;
            border: 1px solid #8ba5c2;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.9rem;
            font-weight: 700;
            color: #1e3b5c;
            cursor: pointer;
            min-width: 40px;
        }
        .operator-btn.active {
            background: #1e3b5c;
            color: white;
        }
        .result-badge {
            background: #f0f7ff;
            border-radius: 20px;
            padding: 4px 8px;
            font-size: 0.75rem;
            color: #003465;
        }
        .saldo-field {
            width: 160px;
            padding: 8px 12px;
            border: 2px solid #1e3b5c;
            border-radius: 16px;
            font-family: 'JetBrains Mono', monospace;
            text-align: right;
            font-weight: 600;
        }
        .remove-btn {
            background: none;
            border: 1px solid #dbb5b5;
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #a13d3d;
            cursor: pointer;
        }
        
        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 28px;
        }
        .add-btn {
            background: white;
            border: 2px dashed #38658f;
            border-radius: 50px;
            padding: 12px 28px;
            font-weight: 600;
            color: #1e3b5c;
            cursor: pointer;
        }
        
        .footer-total {
            margin-top: 32px;
            background: #ffffff;
            border-top: 3px solid #1e3f60;
            border-bottom: 3px solid #1e3f60;
            padding: 18px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 60px;
        }
        .footer-total .amount {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.2rem;
            font-weight: 700;
            color: #003465;
            background: #e5effa;
            padding: 8px 36px;
            border-radius: 60px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>
        ⚖️ Hi-Tech Calculator 
        <small>Anti Galau</small>
    </h1>

    <!-- BULK INPUT SECTION -->
    <div class="bulk-section">
        <div class="bulk-title">
            <h3>Isi Angka Sesuai Hatimu</h3>
            <span class="bulk-badge">Format Angka Bebas Galau</span>
        </div>
        
        <textarea id="bulkInput" placeholder="Masukkan angka, satu per baris&#10;Contoh:&#10;1,000,000&#10;2,500,000.50&#10;(500,000)"></textarea>
        
        <div class="bulk-options">
            <div class="operator-selector">
                <span class="op-option selected" data-op="none">Tanpa op</span>
                <span class="op-option" data-op="×">× (kali)</span>
                <span class="op-option" data-op="÷">÷ (bagi)</span>
            </div>
            <button class="fill-btn" id="fillBulkBtn">Isi Kantong</button>
            <button class="clear-btn" id="clearBulkBtn">Hapus</button>
	        <button class="reset-numbers-btn" id="resetNumbersBtn">Reset ke Nol</button>
            <span class="preview-count" id="previewCount">0 angka</span>
        </div>
    </div>

    <!-- TOTAL DISPLAY -->
    <div class="total-section">
        <span class="total-label">TOTAL AKHIR</span>
        <span class="total-value" id="grandTotalDisplay">0</span>
    </div>

    <!-- TABLE -->
    <table>
        <thead>
            <tr>
                <th>Input / Operator</th>
                <th>Hasil</th>
                <th>Saldo Akhir</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <!-- ACTION BUTTONS -->
    <div class="actions-bar">
        <button class="add-btn" id="addRowBtn">+ Tambah Baris</button>
        <button class="reset-numbers-btn" id="resetNumbersBtn1">Reset ke Nol</button>
    </div>

    <!-- FOOTER TOTAL -->
    <div class="footer-total">
        <span class="label">Total Akhir</span>
        <span class="amount" id="footerTotalAmount">0</span>
    </div>
</div>

<script>
(function() {
    // ============================================
    // FUNGSI FORMAT ANGKA (TANPA .00 UNTUK BULAT)
    // ============================================
    function formatWithCommas(x) {
        if (x === null || x === undefined) return '0';
        let num = parseFloat(x);
        if (isNaN(num)) return '0';
        
        // Cek apakah angka bulat
        if (num % 1 === 0) {
            return num.toLocaleString('en-US', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            });
        } else {
            return num.toLocaleString('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }
    }

    // ============================================
    // PARSER ANGKA
    // ============================================
    function parseIndonesianNumber(str) {
        if (!str || typeof str !== 'string') return NaN;
        
        let original = str.trim();
        if (original === '') return NaN;
        
        let isNegative = original.includes('(') && original.includes(')');
        
        let cleaned = original.replace(/Rp\s*/gi, '');
        cleaned = cleaned.replace(/[()]/g, '');
        cleaned = cleaned.replace(/\s+/g, '');
        
        const hasComma = cleaned.includes(',');
        const hasDot = cleaned.includes('.');
        
        if (hasComma && hasDot) {
            cleaned = cleaned.replace(/,/g, '');
        } else if (hasComma && !hasDot) {
            const commaCount = (cleaned.match(/,/g) || []).length;
            if (commaCount === 1) {
                const parts = cleaned.split(',');
                if (parts[1].length <= 2) {
                    cleaned = cleaned.replace(',', '.');
                } else {
                    cleaned = cleaned.replace(',', '');
                }
            } else {
                cleaned = cleaned.replace(/,/g, '');
            }
        }
        
        cleaned = cleaned.replace(/[^\d.-]/g, '');
        let num = parseFloat(cleaned);
        if (isNaN(num)) return NaN;
        if (isNegative) num = -num;
        
        return num;
    }

    function extractNumbersFromText(text) {
        if (!text) return [];
        const lines = text.split(/\n/);
        const numbers = [];
        
        for (let line of lines) {
            line = line.trim();
            if (line === '') continue;
            let num = parseIndonesianNumber(line);
            if (!isNaN(num)) numbers.push(num);
        }
        return numbers;
    }

    // ============================================
    // FUNGSI UTAMA
    // ============================================
    const tbody = document.getElementById('tableBody');
    const grandTotalSpan = document.getElementById('grandTotalDisplay');
    const footerAmountSpan = document.getElementById('footerTotalAmount');
    const bulkInput = document.getElementById('bulkInput');
    const previewCount = document.getElementById('previewCount');
    
    let selectedOperator = 'none';

    function updateTotal() {
        const rows = tbody.querySelectorAll('tr');
        let sum = new Decimal(0);
        
        rows.forEach(row => {
            const saldoInput = row.querySelector('.saldo-field');
            if (saldoInput && saldoInput.value) {
                let cleanValue = saldoInput.value.replace(/,/g, '');
                let num = new Decimal(cleanValue || 0);
                sum = sum.plus(num);
            }
        });
        
        const total = parseFloat(sum.toFixed(2));
        grandTotalSpan.textContent = total;
        footerAmountSpan.textContent = formatWithCommas(total);
        return total;
    }

    function calculateResult(baseValue, operator, operatorValue) {
        let base = new Decimal(baseValue || 0);
        let opVal = new Decimal(operatorValue || 0);
        
        let result;
        if (operator === '×') {
            result = base.times(opVal);
        } else if (operator === '÷') {
            result = opVal.equals(0) ? new Decimal(0) : base.dividedBy(opVal);
        } else {
            result = base;
        }
        
        return parseFloat(result.toFixed(2));
    }

    function createRow(initialSaldo = 0, operator = '×', opValue = 0, baseValue = 0) {
        const tr = document.createElement('tr');
        
        const td1 = document.createElement('td');
        const calcDiv = document.createElement('div');
        calcDiv.className = 'calc-row';
        
        const baseInput = document.createElement('input');
        baseInput.type = 'number';
        baseInput.className = 'calc-input';
        baseInput.value = baseValue;
        baseInput.step = 'any';
        
        const operatorBtn = document.createElement('button');
        operatorBtn.className = 'operator-btn';
        operatorBtn.textContent = operator;
        operatorBtn.setAttribute('data-operator', operator);
        if (operator === '÷') operatorBtn.classList.add('active');
        
        const operatorValue = document.createElement('input');
        operatorValue.type = 'number';
        operatorValue.className = 'calc-input';
        operatorValue.value = opValue;
        operatorValue.step = 'any';
        
        calcDiv.appendChild(baseInput);
        calcDiv.appendChild(operatorBtn);
        calcDiv.appendChild(operatorValue);
        td1.appendChild(calcDiv);
        tr.appendChild(td1);
        
        const td2 = document.createElement('td');
        const resultSpan = document.createElement('span');
        resultSpan.className = 'result-badge';
        resultSpan.textContent = '→ 0';
        td2.appendChild(resultSpan);
        tr.appendChild(td2);
        
        const td3 = document.createElement('td');
        const saldoField = document.createElement('input');
        saldoField.type = 'number';
        saldoField.className = 'saldo-field';
        saldoField.value = initialSaldo;
        saldoField.step = 'any';
        td3.appendChild(saldoField);
        tr.appendChild(td3);
        
        const td4 = document.createElement('td');
        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.textContent = '✕ Hapus';
        removeBtn.setAttribute('tabindex', '-1');
        td4.appendChild(removeBtn);
        tr.appendChild(td4);

        function updateCalculation() {
            const base = baseInput.value;
            const op = operatorBtn.getAttribute('data-operator');
            const opVal = operatorValue.value;
            
            const result = calculateResult(base, op, opVal);
            
            resultSpan.textContent = '→ ' + result.toLocaleString('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
            
            if (!saldoField.dataset.manualEdited) {
                saldoField.value = result;
            }
            updateTotal();
        }
        
        baseInput.addEventListener('input', function() {
            saldoField.dataset.manualEdited = 'false';
            updateCalculation();
        });
        
        operatorValue.addEventListener('input', function() {
            saldoField.dataset.manualEdited = 'false';
            updateCalculation();
        });
        
        operatorBtn.addEventListener('click', function() {
            const currentOp = this.getAttribute('data-operator');
            const newOp = currentOp === '×' ? '÷' : '×';
            this.textContent = newOp;
            this.setAttribute('data-operator', newOp);
            this.classList.toggle('active', newOp === '÷');
            saldoField.dataset.manualEdited = 'false';
            updateCalculation();
        });
        
        saldoField.addEventListener('input', function() {
            this.dataset.manualEdited = 'true';
            updateTotal();
        });
        
        removeBtn.addEventListener('click', function() {
            tr.remove();
            updateTotal();
        });

        setTimeout(updateCalculation, 10);
        return tr;
    }

    function fillBulkNumbers() {
        const text = bulkInput.value;
        const numbers = extractNumbersFromText(text);
        
        if (numbers.length === 0) {
            alert('Tidak ada angka yang ditemukan');
            return;
        }
        
        const rows = Array.from(tbody.querySelectorAll('tr'));
        const emptyFields = [];
        
        rows.forEach((row, index) => {
            const saldoField = row.querySelector('.saldo-field');
            const currentVal = parseFloat(saldoField.value) || 0;
            const isManual = saldoField.dataset.manualEdited === 'true';
            
            if (currentVal === 0 && !isManual) {
                emptyFields.push({ row, saldoField, index });
            }
        });
        
        let numbersToFill = [...numbers];
        let filledCount = 0;
        
        for (let field of emptyFields) {
            if (numbersToFill.length === 0) break;
            const num = numbersToFill.shift();
            
            if (selectedOperator === 'none') {
                field.saldoField.value = num;
                field.saldoField.dataset.manualEdited = 'false';
                
                const baseInput = field.row.querySelector('.calc-input:first-child');
                const opBtn = field.row.querySelector('.operator-btn');
                const opVal = field.row.querySelector('.calc-input:last-child');
                
                if (baseInput) baseInput.value = 0;
                if (opBtn) {
                    opBtn.textContent = '×';
                    opBtn.setAttribute('data-operator', '×');
                    opBtn.classList.remove('active');
                }
                if (opVal) opVal.value = 0;
            } else {
                const baseInput = field.row.querySelector('.calc-input:first-child');
                const opBtn = field.row.querySelector('.operator-btn');
                const opVal = field.row.querySelector('.calc-input:last-child');
                
                if (baseInput) baseInput.value = num;
                if (opBtn) {
                    opBtn.textContent = selectedOperator;
                    opBtn.setAttribute('data-operator', selectedOperator);
                    opBtn.classList.toggle('active', selectedOperator === '÷');
                }
                if (opVal) opVal.value = 1;
                if (baseInput) baseInput.dispatchEvent(new Event('input'));
            }
            filledCount++;
        }
        
        while (numbersToFill.length > 0) {
            const num = numbersToFill.shift();
            
            if (selectedOperator === 'none') {
                const newRow = createRow(num, '×', 0, 0);
                tbody.appendChild(newRow);
            } else {
                const newRow = createRow(0, selectedOperator, 1, num);
                tbody.appendChild(newRow);
                const baseInput = newRow.querySelector('.calc-input:first-child');
                if (baseInput) baseInput.dispatchEvent(new Event('input'));
            }
            filledCount++;
        }
        
        updateTotal();
        alert(`${filledCount} angka berhasil diisi`);
    }

    function resetAllToZero() {
        const rows = tbody.querySelectorAll('tr');
        rows.forEach(row => {
            const baseInput = row.querySelector('.calc-input:first-child');
            const operatorValue = row.querySelector('.calc-input:last-child');
            const saldoField = row.querySelector('.saldo-field');
            const operatorBtn = row.querySelector('.operator-btn');
            
            if (baseInput) baseInput.value = '0';
            if (operatorValue) operatorValue.value = '0';
            if (saldoField) {
                saldoField.value = '0';
                saldoField.dataset.manualEdited = 'false';
            }
            if (operatorBtn) {
                operatorBtn.textContent = '×';
                operatorBtn.setAttribute('data-operator', '×');
                operatorBtn.classList.remove('active');
            }
        });
        updateTotal();
    }

    function updatePreview() {
        const text = bulkInput.value;
        const numbers = extractNumbersFromText(text);
        previewCount.textContent = `${numbers.length} angka`;
    }

    // Event listeners
    document.querySelectorAll('.op-option').forEach(opt => {
        opt.addEventListener('click', function() {
            document.querySelectorAll('.op-option').forEach(o => o.classList.remove('selected'));
            this.classList.add('selected');
            selectedOperator = this.getAttribute('data-op');
        });
    });
    
    document.getElementById('fillBulkBtn').addEventListener('click', fillBulkNumbers);
    document.getElementById('clearBulkBtn').addEventListener('click', function() {
        bulkInput.value = '';
        updatePreview();
    });
    
    bulkInput.addEventListener('input', updatePreview);
    
    document.getElementById('addRowBtn').addEventListener('click', function() {
        tbody.appendChild(createRow(0, '×', 0, 0));
        updateTotal();
    });
    
    document.getElementById('resetNumbersBtn').addEventListener('click', resetAllToZero);
    document.getElementById('resetNumbersBtn1').addEventListener('click', resetAllToZero)
    
    // Initial rows
    for (let i = 0; i < 4; i++) {
        tbody.appendChild(createRow(0, '×', 0, 0));
    }
    updateTotal();
    updatePreview();
})();
</script>
<div id="loginModal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 9999;">
  <div style="background: white; padding: 40px; border-radius: 10px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
    <h2>Calculator Access</h2>
    <p>Enter password to continue:</p>
    <input type="password" id="passwordInput" placeholder="Password" style="padding: 10px; width: 200px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px;">
    <br>
    <button onclick="checkPassword()" style="padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">Submit</button>
  </div>
</div>

<script>
  function checkPassword() {
    const correctPassword = "pavian2026"; // Change this!
    const input = document.getElementById("passwordInput").value;
    
    if (input === correctPassword) {
      document.getElementById("loginModal").style.display = "none";
      sessionStorage.setItem("authenticated", "true");
    } else {
      alert("Incorrect password. Try again.");
      document.getElementById("passwordInput").value = "";
    }
  }
  
  // Check on page load
  if (!sessionStorage.getItem("authenticated")) {
    // Modal stays visible until correct password
  } else {
    document.getElementById("loginModal").style.display = "none";
  }
  
  // Allow Enter key to submit
  document.addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
      checkPassword();
    }
  });
</script>
</body>
</html>
